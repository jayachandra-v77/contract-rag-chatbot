<!DOCTYPE html>
<html>

<head>
<title>AI Contract Chatbot</title>

<style>

body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.chat-container{
width:420px;
height:550px;
background:#1e293b;
border-radius:12px;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.chat-header{
background:#22c55e;
padding:15px;
font-size:18px;
text-align:center;
}

.chat-box{
flex:1;
padding:15px;
overflow-y:auto;
}

.message{
margin:10px 0;
padding:10px;
border-radius:8px;
max-width:75%;
}

.user{
background:#3b82f6;
align-self:flex-end;
margin-left:auto;
}

.bot{
background:#334155;
}

.input-area{
display:flex;
border-top:1px solid #475569;
}

input{
flex:1;
padding:12px;
border:none;
outline:none;
background:#0f172a;
color:white;
}

button{
padding:12px;
background:#22c55e;
border:none;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.robot{
font-size:24px;
margin-right:6px;
}

</style>

</head>

<body>

<div class="chat-container">

<div class="chat-header">
<span class="robot">🤖</span> AI Contract Docseach Assistant
</div>

<div id="chatBox" class="chat-box"></div>

<div class="input-area">
<input id="question" placeholder="Ask something..." onkeypress="handleKey(event)">
<button onclick="send()">Send</button>
</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
