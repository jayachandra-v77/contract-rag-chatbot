<!DOCTYPE html>
<html>
<head>
    <title>🤖 AI Chatbot</title>

    <style>
        body {
            margin: 0;
            background: #0f172a;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .chat-container {
            width: 420px;
            height: 550px;
            background: #1e293b;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .chat-header {
            background: #22c55e;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        .chat-body {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column; /* IMPORTANT */
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            max-width: 80%;
        }

        .user {
            background: #3b82f6;
            align-self: flex-end;
        }

        .bot {
            background: #334155;
            align-self: flex-start;
        }

        .chat-footer {
            display: flex;
            padding: 10px;
            background: #0f172a;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            background: #22c55e;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">
        🤖 AI Chatbot DocSearch Assistant
    </div>

    <div class="chat-body" id="chat"></div>

    <div class="chat-footer">
        <input type="text" id="question" placeholder="Ask something..." onkeydown="handleEnter(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script src="/static/script.js"></script>

</body>
</html>
